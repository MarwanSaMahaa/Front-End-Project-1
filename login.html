<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body class="bg-gray">

    <div class="container">
        <div class="left">
            <h1>Login</h1>
            <p>Don't have an account? <br>Create one <a href="signup.html">here</a></p>
        </div>
        <div class="right">
            <form autocomplete="off" onsubmit="handleLogin(event)">
                <div class="username-input input-group">
                    <label for="username">Username</label>
                    <input required type="username" name="Username" id="username" placeholder="Username">
                </div>
                <div class="pass-input input-group">
                    <label for="password">Password</label>
                    <input required type="password" name="Password" id="password" placeholder="Password">
                </div>
                <button class="form-btn" type="submit">Log In</button>
            </form>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
