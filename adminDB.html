<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Dashboard</title>
    <link rel="stylesheet" href="admindb.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  </head>
  <body>
    <nav class="navbar">
      <h1 class="title">Products Dashboard</h1>
    </nav>
    <div class="container">
      <div class="header">
        <h1>All Products</h1>
        <button onclick="createModal()" class="create-product"> Create new product <i class="fa-solid fa-plus"></i>
        </button>
      </div>
      <div class="card-container"></div>
    </div>
    <div class="popups hidden">
      <div class="edit-popup hidden">
        <div class="popup-container">
          <div class="edit-header">
            <h1 class="popup-title">Edit product</h1>
            <i onclick="editModal()" class="fa-solid fa-xmark gray"></i>
          </div>
          <form onsubmit="handleEditProduct(event)">
            <div>
              <label>Updated name <span class="red">*</span>
              </label>
              <input class="edit-name-input" type="text" placeholder="Name" required>
            </div>
            <div>
              <label>Updated price <span class="red">*</span>
              </label>
              <input class="edit-price-input" type="number" placeholder="Price" required>
            </div>
            <div>
              <label>Updated quantity <span class="red">*</span>
              </label>
              <input class="edit-quantity-input" type="number" placeholder="Quantity" required>
            </div>
            <button class="update-btn" type="submit"> Update product </button>
          </form>
        </div>
      </div>
      <div class="delete-popup hidden">
        <div class="popup-container">
          <h1 class="popup-title">Delete product</h1>
          <p>Are you sure you want to delete this product?</p>
          <div class="del-btns-container">
            <button onclick="confirmDelete()" class="delete-yes"> Yes </button>
            <button onclick="delModal()" class="delete-no"> No </button>
          </div>
        </div>
      </div>
      <div class="create-popup hidden">
        <div class="popup-container">
          <div class="create-header">
            <h1 class="popup-title">Create product</h1>
            <i onclick="createModal()" class="fa-solid fa-xmark gray"></i>
          </div>
          <form onsubmit="handleCreateProduct(event)">
            <div>
              <label>Name <span class="red">*</span>
              </label>
              <input class="name-input" type="text" placeholder="Name" required>
            </div>
            <diV>
              <label>Price <span class="red">*</span>
              </label>
              <input class="price-input" type="number" placeholder="Price" required>
            </diV>
            <div>
              <label>Quantity <span class="red">*</span>
              </label>
              <input class="quantity-input" type="number" placeholder="Quantity" required>
            </div>
            <button class="update-btn" type="submit"> Create product </button>
          </form>
        </div>
      </div>
    </div>
    <script src="admindb.js"></script>
  </body>
</html>
